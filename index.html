<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل السفر البري إلى مكة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('kaaba.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            direction: rtl;
            position: relative;
        }

        /* Dark overlay for better text readability */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 15px;
            margin-top: 0;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #f8f9fa;
        }

        .prayer {
            font-size: 1.2rem;
            color: #f1c40f; /* Golden touch to match the Kaaba theme */
            margin-bottom: 40px;
            font-weight: 700;
        }

        .countries {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .country-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px 10px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .country-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .footer {
            font-size: 1rem;
            color: #dcdde1;
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 25px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.2rem; }
            .prayer { font-size: 1rem; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>دليل السفر البري إلى مكة</h1>
        <div class="subtitle">عمرة مقبولة ورحلة آمنة بإذن الله 🕋</div>
        <div class="prayer">تذكرونا بدعوة صالحة 🤲</div>
        
        <div class="countries">
            <a href="./qatar/" class="country-link">قطر <img src="https://flagcdn.com/w40/qa.png" alt="قطر" style="width: 26px; height: 18px; object-fit: cover; border-radius: 3px;"></a>
            <a href="./ksa/" class="country-link">السعودية <img src="https://flagcdn.com/w40/sa.png" alt="السعودية" style="width: 26px; height: 18px; object-fit: cover; border-radius: 3px;"></a>
            <a href="./uae/" class="country-link">الإمارات <img src="https://flagcdn.com/w40/ae.png" alt="الإمارات" style="width: 26px; height: 18px; object-fit: cover; border-radius: 3px;"></a>
            <a href="./bahrain/" class="country-link">البحرين <img src="https://flagcdn.com/w40/bh.png" alt="البحرين" style="width: 26px; height: 18px; object-fit: cover; border-radius: 3px;"></a>
            <a href="./kuwait/" class="country-link">الكويت <img src="https://flagcdn.com/w40/kw.png" alt="الكويت" style="width: 26px; height: 18px; object-fit: cover; border-radius: 3px;"></a>
            <a href="./oman/" class="country-link">عُمان <img src="https://flagcdn.com/w40/om.png" alt="عُمان" style="width: 26px; height: 18px; object-fit: cover; border-radius: 3px;"></a>
        </div>

        <div class="footer">
            تم تصميم الصفحة بواسطة معاذ بلال
        </div>
    </div>
</body>
</html>
